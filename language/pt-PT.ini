Pass.Arguments.Message=You can pass command line arguments like this:{crlf;}{crlf;}    DISMTools.exe <arguments>{crlf;}{crlf;}The command line arguments that are available to you are the following:{crlf;}{crlf;}  /setup{crlf;}      Shows the initial setup wizard and reconfigures the program{crlf;}  /load=<path-to-project>{crlf;}      Loads a project file. You need to provide an absolute path for a project file, like this:{crlf;}      DISMTools.exe /load={quot;}C:\foo\bar.dtproj{quot;}{crlf;}  /online{crlf;}      Enters the online installation management mode{crlf;}  /offline:<drive>{crlf;}      Enters the offline installation management mode. You need to provide a drive, like this:{crlf;}      DISMTools.exe /offline:E:\{crlf;}  /migrate{crlf;}      Forces setting migration. While you can use this parameter, it should be used by the update system{crlf;}  /nomig{crlf;}      Skips setting migration. This parameter speeds up testing{crlf;}  /noupd{crlf;}      Disables update checks. Don't use this parameter unless you're testing a change{crlf;}  /exp{crlf;}      Enables program experiments if there are any{crlf;}{crlf;}DISMTools will continue starting up after you close this help message.
