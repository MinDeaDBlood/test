[Options.QuickHelp]
DISM.Tools.Enable.Message=O DISMTools ativa ou desativa determinadas funções se não forem compatíveis com o executável DISM especificado, com a imagem atual do Windows ou com ambos.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Por exemplo, se o DISMTools detetar uma imagem do Windows 7, uma versão do DISM do Windows 7 ou ambos, desativa a manutenção de pacotes AppX e capacidades porque não são compatíveis com essa plataforma e essas ferramentas.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}O DISMTools também pode desativar funções com base noutros parâmetros da imagem, como a edição. Isto acontece geralmente com imagens Windows PE.
AppX.Package.Display.Message=Os nomes de apresentação dos pacotes AppX são a parte do nome da família do pacote que não contém detalhes específicos, como arquitetura, versão ou hash do publicador.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Os {lbrace;}1{rbrace;}nomes amigáveis{lbrace;}1{rbrace;} dos pacotes AppX são os nomes que vês no menu Iniciar. São lidos a partir das informações de identidade da aplicação no manifesto ou de cadeias incorporadas em resources.pri.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Se o DISMTools não conseguir obter o nome amigável, mostra o nome de apresentação da aplicação.
Configure.Search.Message=Ao configurar o motor de pesquisa, podes escolher quanta tolerância o DISMTools deve ter em relação às funções de inteligência artificial, AI, do motor.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Desativar o maior número possível de funções AI{lbrace;}1{rbrace;} permite escolher motores onde as funções AI estão desativadas ou não existem por predefinição.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Permitir que eu controle as funções AI do meu motor de pesquisa{lbrace;}1{rbrace;} adiciona motores com funções AI ativadas por predefinição, mas controláveis por parâmetros de URL ou definições do motor.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Ativar o maior número possível de funções AI{lbrace;}1{rbrace;} permite escolher todos os motores disponíveis, incluindo motores baseados em AI ou motores que promovem modos AI dedicados.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Normalmente, a segunda opção é a escolha mais equilibrada. Para uma experiência mais focada na privacidade, desativa estas funções.
Bg.Procs.Allow.Message=Os processos em segundo plano permitem que o DISMTools recolha informações sobre a imagem Windows em que estás a trabalhar e ativam a maioria das tarefas. Exemplos incluem pacotes do sistema operativo e funcionalidades presentes numa imagem Windows.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Estes processos não são usados apenas para obter informações de ficheiros de imagem, mas também para gerir instalações online ou offline.

