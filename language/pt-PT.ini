[DriverFilter.Classes]
AudioProcessing.Message=Includes Audio processing objects (APOs). For more info, see Windows Audio Processing Objects.
Battery.Devices.UPS.Label=Includes battery devices and UPS devices.
Windows.Message=(Windows Server 2003 and later versions) Includes all biometric-based personal identification devices.
Windows.Label=(Windows XP SP1 and later versions) Includes all Bluetooth devices.
Camera.Message=(Windows 10 version 1709 and later versions) Includes universal camera drivers.
Cd.Rom.Drives.Message=Includes CD-ROM drives, including SCSI CD-ROM drives. By default, the system's CD-ROM class installer also installs a system-supplied CD audio driver and CD-ROM changer driver as Plug and Play filters.
Hard.Disk.Drives.Label=Includes hard disk drives. See also the HDC and SCSIAdapter classes.
VideoAdapters.Message=Includes video adapters. Drivers for this class include display drivers and video miniport drivers.
Extension.Message=(Windows 10 and later versions) Includes all devices requiring customizations. For more information, see Using an Extension INF File.
Floppy.Disk.Drive.Label=Includes floppy disk drive controllers.
Floppy.Disk.Drives.Label=Includes floppy disk drives.
Includes.Hard.Message=Includes hard disk controllers, including ATA/ATAPI controllers but not SCSI and RAID disk controllers.
InputDevices.Message=Includes interactive input devices that are operated by the system-supplied HID class driver. Includes USB devices that comply with the USB HID Standard and non-USB devices that use a HID minidriver. For more information, see HIDClass Device Setup Class. See also the Keyboard or Mouse classes.
ControlDevices.Message=Includes devices that control the operation of multifunction IEEE 1284.4 peripheral devices.
Dot.Print.Functions.Message=Includes Dot4 print functions. A Dot4 print function is a function on a Dot4 device and has a single child device, which is a member of the Printer device setup class.
Ieeedevices.Support.Message=Includes IEEE 1394 devices that support the IEC-61883 protocol device class. The 61883 component includes the 61883.sys protocol driver that transmits various audio and video data streams over the 1394 bus. These currently include standard/high/low quality DV, MPEG2, DSS, and Audio. The IEC-61883 specifications define these data streams.
Ieeedevices.Support.Label=Includes IEEE 1394 devices that support the AVC protocol device class.
SBP2.Message=Includes IEEE 1394 devices that support the SBP2 protocol device class.
HostControllers.Message=Includes 1394 host controllers connected on a PCI bus, but not 1394 peripherals. Drivers for this class are system-supplied.
Still.Image.Capture.Label=Includes still-image capture devices, digital cameras, and scanners.
InfraredDevices.Message=Includes infrared devices. Drivers for this class include Serial-IR and Fast-IR NDIS miniports, but see also the Network Adapter class for other NDIS network adapter miniports.
Keyboards.Message=Includes all keyboards. That is, it must also be specified in the (secondary) INF for an enumerated child HID keyboard device.
ScsimediaChanger.Label=Includes SCSI media changer devices.
Memory.Devices.Such.Label=Includes memory devices, such as flash memory cards.
Modem.Devices.INF.Message=Includes modem devices. An INF file for a device of this class specifies the features and configuration of the device and stores this information in the registry. An INF file for a device of this class can also be used to install device drivers for a controllerless modem or a software modem. These devices split the functionality between the modem device and the device driver. For more information about modem INF files and Microsoft Windows Driver Model (WDM) modem devices, see Overview of Modem INF Files and Adding WDM Modem Support.
Display.Monitors.INF.Message=Includes display monitors. An INF for a device of this class installs no device drivers, but instead specifies the features of a particular monitor to be stored in the registry for use by drivers of video adapters. (Monitors are enumerated as the child devices of display adapters.)
Mouse.Devices.Message=Includes all mouse devices and other kinds of pointing devices, such as trackballs. That is, this class must also be specified in the (secondary) INF for an enumerated child HID mouse device.
Combo.Cards.Such.Message=Includes combo cards, such as a PCMCIA modem and network card adapter. The driver for such a Plug and Play multifunction device is installed under this class and enumerates the modem and network card separately as its child devices.
Audio.Dvdmultimedia.Message=Includes Audio and DVD multimedia devices, joystick ports, and full-motion video capture devices.
MultiportSerial.Message=Includes intelligent multiport serial cards, but not peripheral devices that connect to its ports. It doesn't include unintelligent (16550-type) multiport serial controllers or single-port serial controllers (see the Ports class).
NetworkAdapter.Message=Consists of network adapter drivers. These drivers must either call NdisMRegisterMiniportDriver or NetAdapterCreate. Drivers that don't use NDIS or NetAdapter should use a different setup class.
Includes.Network.Message=Includes network and/or print providers. NetClient components are deprecated in Windows 8.1, Windows Server 2012 R2, and later.
Network.Services.Such.Label=Includes network services, such as redirectors and servers.
NdisprotocolsCo.Message=Includes NDIS protocols CoNDIS stand-alone call managers, and CoNDIS clients, in addition to higher level drivers in transport stacks.
SecureDevices.Message=Includes devices that accelerate secure socket layer (SSL) cryptographic processing.
PcmciacardBus.Message=Includes PCMCIA and CardBus host controllers, but not PCMCIA or CardBus peripherals. Drivers for this class are system-supplied.
Serial.Parallel.Port.Message=Includes serial and parallel port devices. See also the MultiportSerial class.
Printers.Admin.Hit.Label=Includes printers. As an IT admin, hit them with a baseball bat.
Includes.SCSI.Message=Includes SCSI/1394-enumerated printers. Drivers for this class provide printer communication for a specific bus.
ProcessorTypes.Label=Includes processor types.
ScsihostBus.Message=Includes SCSI Host Bus Adapters (HBAs), disk-array, and NVMe controllers.
Includes.Trusted.Message=Includes Trusted Platform Module chips. A TPM is a secure cryptoprocessor that helps you with actions such as generating, storing, and limiting the use of cryptographic keys. Any new manufactured device must implement and enable TPM 2.0 by default. For more information, see TPM Recommendations.
Includes.Sensor.Label=Includes sensor and location devices, such as GPS devices.
Smart.Card.Readers.Label=Includes smart card readers.
Virtual.Child.Device.Message=Includes virtual child device to encapsulate software components. For more information, see Adding Software Components with an INF file.
Storage.Disks.Label=Storage disks utilizing a multi-queue storage stack.
Includes.Storage.Message=Includes storage volumes as defined by the system-supplied logical volume manager and class drivers that create device objects to represent storage volumes, such as the system disk class driver.
HalsSystem.Message=Includes HALs, system buses, system bridges, the system ACPI driver, and the system volume manager driver.
Tape.Drives.Including.Label=Includes tape drives, including all tape miniclass drivers.
Usbdevice.Includes.Message=USBDevice includes all USB devices that don't belong to another class. This class isn't used for USB host controllers and hubs; drivers for these devices are provided by the operating system and should use the USB class described in System-Defined Device Setup Classes Reserved for System Use.
WindowsCeactive.Message=Includes Windows CE ActiveSync devices. The WCEUSBS setup class supports communication between a personal computer and a device that is compatible with the Windows CE ActiveSync driver (generally, PocketPC devices) over USB.
Wpddevices.Label=Includes WPD devices.

