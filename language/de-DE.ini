[PEHelper.Designer.Sysprep]
Responsibility.Message=Das Sysprep-Vorbereitungstool, das für die Vorbereitung von Systemen für die Imagefassung verantwortlich ist, kann in 2 Modi betrieben werden: Automatischer Modus und Manueller Modus.{crlf;}{crlf;}- Der automatische Modus führt Prüfungen durch und bereitet Ihren Computer automatisch vor und verallgemeinert ihn, wenn diese Prüfungen bestanden werden. Sie müssen nicht mit dem Tool interagieren, es sei denn, die Prüfungen schlagen fehl oder werden mit Warnungen abgeschlossen. Es wird auch ein Standardsatz von Optionen für Sysprep verwendet{crlf;}- Im manuellen Modus können Sie die Starteinstellungen von Sysprep konfigurieren und jeden Schritt des Tools in Ihrem eigenen Tempo durchgehen. Dies wird für fortgeschrittene Benutzer empfohlen{crlf;}{crlf;}Wählen Sie den Modus aus, den Sie verwenden möchten:
