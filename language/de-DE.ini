PreviewChanges.Message=Gesamtänderungen:{crlf;}{crlf;}-- Fehlerbehebungen in Vorschauversionen{crlf;}{crlf;}- Problem behoben, bei dem entfernte Funktionen an der falschen Stelle angezeigt wurden{crlf;}- Ein kleines UI-Problem behoben, bei dem der richtige Hauptbenutzername (UPN) nicht angezeigt wurde, wenn ein Benutzer im ADDS-Domänenbeitrittsassistenten ausgewählt wurde{crlf;}- Ein kleines UI-Problem wurde behoben, bei dem der NT-Anmeldepfad eines Domänenbenutzers beim ersten Starten des ADDS-Domänenbeitrittsassistenten nicht angezeigt wurde{crlf;}- Einige HiDPI-Probleme wurden behoben{crlf;}- Ein Problem wurde behoben, bei dem bei der Verwaltung der aktiven Installation die Revisionsnummer der Version manchmal nicht mit der tatsächlichen Revisionsnummer übereinstimmte{crlf;}- Ein Problem wurde behoben, bei dem Informationen zu einem Windows-Image nach dem Hinzufügen oder Entfernen von Paketen gelöscht wurden{crlf;}- Ein Problem wurde behoben, bei dem das Programm eine Ausnahme auslöste, wenn es das Protokollverzeichnis nicht erstellen konnte (#344, danke @Low351){crlf;}- Ein Problem wurde behoben, bei dem GraphoView keine Informationen zu einem ausgewählten Windows-Image anzeigte, wenn die WDS-Gruppe, zu der es gehört, nur 1 Image {crlf;} hat. Ein Problem wurde behoben, bei dem beim Ausführen von FFU captures{crlf;}keine Optionen für den CompressionType „Capture“ verwendet wurden- Ein Problem wurde behoben, bei dem das Programm eine Ausnahme auslöste, wenn mehrere Treiberexporte nach Klassennamen durchgeführt wurden{crlf;}- Eine Ausnahme wurde behoben (#350, danke @TackleBarry80){crlf;}- Extern entladene Registrierungs-Hives verursachen keine Fehler mehr beim Entladen aus dem Image Registry Control Panel{crlf;}- Nicht PowerShell-basierte Endpunkte werfen beim Aufruf von WDS Helper Server APIs keine CORS-Probleme mehr auf{crlf;}- Ein Problem wurde behoben, bei dem App Installer-Downloadfehler nicht im Vordergrund angezeigt wurden{crlf;}- Ein Problem wurde behoben, bei dem Tutorial-Videos nicht abspielbar waren{crlf;}- Die WDS Helper-Client-Nachricht zum Herunterladen unbeaufsichtigter Antwortdateien wird nicht mehr immer angezeigt{crlf;}- Ein Problem wurde behoben, bei dem das Programm beim Speichern der Windows PE-Konfiguration einer Offline-Windows PE-Installation eine Ausnahme auslöste{crlf;}- Ein Problem wurde behoben, bei dem die vollständige Datumszeichenfolge beim Zugriff auf Imageeigenschaften mit ausgeschalteten Windows-Datumsdarstellungen nicht korrekt angezeigt wurde{crlf;}- Beim Hinzufügen eines Boot-Images zum WDS-Server wird der Dienststart jetzt nur noch angefordert, wenn er nicht ausgeführt wird{crlf;}- Eine Ausnahme wurde behoben, die beim Hinzufügen bestimmter AppX-Pakete auftrat (#365, #366, danke @charlezmmonroe-byte){crlf;}{crlf;}-- Neue Funktionen{crlf;}{crlf;}- Das Sysprep-Vorbereitungstool unterstützt „CopyProfile“ und kann jetzt AppX-Pakete aus dem Referenzsystem entfernen{crlf;}- Es wurden Schutzvorrichtungen hinzugefügt, um die Ausführung des PE-Helfers in einer PXE-Umgebung zu verhindern, und um zu warnen, wenn die PXE-Helfer in einer Nicht-PXE-Umgebung ausgeführt werden{crlf;}- Das Autorun-Menü verfügt jetzt über Optionen zum Durchsuche des Disc-Inhalts und zum Kopieren des Boot-Images auf einen WDS-Server{crlf;}- Die DISMTools-Vorinstallationsumgebung kann jetzt über Richtlinien konfiguriert werden{crlf;}- Sie können jetzt Image und Gruppen in einem WDS-Server grafisch anzeigen{crlf;}- Beim Starten des Treiberinstallationsmoduls kann Ihnen die Vorinstallationsumgebung jetzt die Hardware-IDs unbekannter Geräte mitteilen{crlf;}- HotInstall kann jetzt SCSI-Adapter exportieren, um sie im DTPE-Image zu installieren{crlf;}- Wenn im Imagefassungsskript ein nicht sysprepped-Volume ausgewählt wird, wird es Sie jetzt warnen{crlf;}- Eine neue Aufgabe wurde hinzugefügt, um InstallationsImage auf einen Windows Deployment Services (WDS)-Server zu kopieren{crlf;}- Von der Autorun-Anwendung aus können Sie jetzt die WDS-Imagegruppe angeben, auf die das Image hochgeladen werden soll{crlf;}- Die Autorun-Anwendung und HotInstall haben HiDPI-Verbesserungen gesehen{crlf;}- Partitionstabellenüberschreibungen können jetzt beim Bereitstellen von Imagen mit dem WDS Helper{crlf;}- verwendet werden. PXE-Helferserver können jetzt mit einem anderen Port gestartet werden, indem SHIFT gedrückt gehalten und eine Aktion an den folgenden Stellen ausgeführt wird:{crlf;} - Von der Autorun-Anwendung{crlf;} - Von den Tools > Start PXE Helper Server für Menü im Hauptprogramm{crlf;}- Die Architektur für das WDS-Boot-Image wird jetzt grafisch ausgewählt{crlf;}- Der Standardsatz der DISMTools-Vorinstallationsumgebungshintergründe wurde überarbeitet{crlf;}- Der WDS-Helferclient erkennt jetzt den zugewiesenen Volumenbuchstaben für die Imagefreigabe zuverlässiger{crlf;}- Ergebnisse der ISO-Dateierstellung werden jetzt in einer Benachrichtigung angezeigt{crlf;}- Sie können jetzt das Tastaturlayout in der Vorinstallationsumgebung grafisch konfigurieren{crlf;}- Wenn das Sysprep-Vorbereitungstool vor der Aufnahme des Images aufgerufen wurde, werden temporäre Dateien und Booteinträge jetzt entfernt, wenn die Aufnahme erfolgreich ist. Das resultierende Windows-Image enthält immer noch keines dieser Elemente{crlf;}- Das Versionsreporter-Wasserzeichen in der DISMTools-Vorinstallationsumgebung kann jetzt erkennen, wann die Umgebung über ein Netzwerk gebootet hat{crlf;}- Der PE-Helfer kann jetzt die wesentlichen Treiber Ihres Zielsystems (Speichercontroller und Netzwerkadapter) in die DISMTools-Vorinstallationsumgebung{crlf;}aufnehmen- Mit dem ISO-Erstellungsassistenten können Sie einen Speicherort angeben, wenn Sie auf „OK“ geklickt haben, ohne einen angegeben zu haben. {crlf;}- Sie können jetzt Skripte angeben, die in VBScript und JScript geschrieben sind. {crlf;}- Das Starterskript {quot;}Aktivieren der Batch-Skriptdateisperren. {quot;} wurde eingeführt. {crlf;}- Das {quot;}Längenlimit für MAX_PATH entfernen{quot;} Starterskript wurde eingeführt{crlf;}- Das Starterskript {quot;}Systemdesktop-Symbole anzeigen und ausblenden{quot;} wurde eingeführt{crlf;}- Das Starterskript {quot;}Datei-Explorer festlegen Ordner starten{quot;} wurde eingeführt{crlf;}- Das Starterskript {quot;}Windows Admin Center deaktivieren/Azure Arc-Banner{quot;} Starterskript wurde eingeführt{crlf;}- Das Starterskript {quot;}Disable Shutdown Event Tracker{quot;} wurde eingeführt{crlf;}- Das Starterskript {quot;}Refresh Windows Explorer{quot;} wurde eingeführt{crlf;}- Das Starterskript {quot;}Configure Start Menu Appearance{quot;} Starterskript wurde eingeführt{crlf;}- Das {quot;}Warnungen für nicht signierte RDP-Dateien deaktivieren{quot;} Starterskript wurde eingeführt{crlf;}- Das {quot;}PowerShell-Ausführungsrichtlinie konfigurieren{quot;} Starterskript wurde eingeführt{crlf;}- Das {quot;}PowerPlan-Werte konfigurieren{quot;} Starterskript wurde eingeführt{crlf;}- Das Starterskript {quot;}Invoke Windows Utility Configuration{quot;} wurde aktualisiert{crlf;}- Das Starterskript {quot;}Restore Classic Context Menü in Windows 11{quot;} wurde eingeführt{crlf;}- Der Starterskript-Editor hat mehrere Verbesserungen erfahren:{crlf;} – Der Starter-Skript-Editor hat Unterstützung für den Dunkelmodus erhalten{crlf;} – Der Starter-Skript-Editor erkennt jetzt schreibgeschützte Starter-Skripte und entfernt solche Attribute beim Speichern{crlf;} – Abstände im Skriptcode können jetzt normalisiert werden{crlf;} – Organisationseinheiten und Benutzer in Organisationseinheiten werden jetzt alphabetisch in der ADDS-Domäne sortiert. Join Wizard{crlf;}- Mit dem ADDS-Domänenbeitrittsassistenten können Sie jetzt fortfahren, wenn Sie ein Konto ausgewählt haben, für das kein Passwort erforderlich ist{crlf;}- Es wurde eine Aufgabe hinzugefügt, um eine vorkonfigurierte Antwortdatei in ein Image zu kopieren, sodass es automatisch in den Audit-Modus startet{crlf;}- Der ADDS-Domänenbeitrittsassistent hat einige Verbesserungen gesehen:{crlf;} – Der Assistent lässt Sie nicht mehr fortfahren, wenn Sie ein Domänenkonto angeben, das nicht existiert. {crlf;} – Sie können jetzt die Auflösung von Domänennamen testen, indem Sie nslookup{crlf;} aufrufen. – Sie können jetzt Kontoobjekte von überall in Ihrer Domäne auswählen. {crlf;}- Beim Anwenden von Antwortdateien können Sie jetzt auswählen, ob sie in den Sysprep-Ordner des ZielImages kopiert werden sollen{crlf;}- Sie können jetzt den Vorschaubereich für den Starterskriptcode vergrößern{crlf;}- Sie können jetzt Kontoanzeigernamen unabhängig von Kontonamen konfigurieren{crlf;}- Postinstallationsskripte können jetzt neu geordnet werden{crlf;}- Batch-Skripte mit NT-Erweiterungen werden nicht mehr unterstützt{crlf;}- Serviceinformationen können jetzt in einem Bericht gespeichert werden, unabhängig davon, ob Sie ein Windows-Image oder eine Installation verwalten{crlf;}- Dienste können jetzt entfernt werden{crlf;}- Der Imageinformationsspeicher wird jetzt asynchron ausgeführt{crlf;}- Wenn Informationen zu einer Paketdatei nicht abgerufen werden können, DISMTools verarbeitet jetzt den Rest der Warteschlange weiter{crlf;}- Filterassistenten wurden zu den Funktions-, Fähigkeits- und Treiberinformationsdialogen hinzugefügt, damit Sie Abfragen einfacher erstellen können{crlf;}- Ein neuer automatischer Imageneuladedienst ist jetzt enthalten, damit Sie alle Ihre Image beim Systemstart neu laden lassen{crlf;}- Sie können Treiber jetzt nach Klassennamen exportieren{crlf;}- Imagefassungsaufgaben warnen Sie jetzt, wenn Quellinstallationen nicht mit Sysprep vorbereitet wurden{crlf;}- Eine neue Aufgabe wurde hinzugefügt, um Windows-Image zu optimieren{crlf;}- Unterstützung für Full Flash Utility (FFU) wurde eingeführt. Variationen der Imageanwendung, -erfassung, -aufteilung und -optimierung wurden mit FFU-Unterstützung eingeführt{crlf;}- Aus der Projektansicht können Sie jetzt Commit-Operationen an FFU-Dateien mithilfe eines Workarounds durchführen{crlf;}- Sie können jetzt installierte Treiberinformationen aus Windows 7-Imagen abrufen{crlf;}- Projekte und Installationsverwaltungsmodi werden jetzt viel schneller geladen und entladen{crlf;}- Das Entfernen bereitgestellter AppX-Pakete aus dem Online-Installationsverwaltungsmodus ist jetzt viel zuverlässiger{crlf;}- Sie können jetzt viel einfacher auf WIM- und FFU-Varianten der Imagefassungs- und Anwendungsaufgaben zugreifen{crlf;}- Nach dem Extrahieren von Imagen aus ISO-Dateien können Sie mit dem Programm nun das am besten geeignete InstallationsImage daraus auswählen{crlf;}- Sie können jetzt Informationen anzeigen, die für FFU-Dateien spezifisch sind, wenn Sie gemountete Imageeigenschaften anzeigen{crlf;}- Beim Herunterladen von Paketen aus App Installer-Dateien können Sie jetzt die URLs in das Hauptanwendungspaket kopieren{crlf;}- Beim Exportieren von Treibern nach Klassennamen oder beim Filtern installierter Treiber nach Klassennamen, Sie können jetzt aus Drittanbieterklassen wählen, die von Drittanbietertreibern in Ihrem Windows-Image oder Ihrer Windows-Installation bereitgestellt werden. {crlf;} – Sie können jetzt Treiber aus Windows 7-Images und -Installationen exportieren. {crlf;} – Das Speichern von Serviceänderungen geht jetzt viel schneller. {crlf;} – Fragen des Imageinformationsspeichers werden nicht mehr im Hintergrund gestellt. {crlf;}- FFU-Datei-Commit-Operationen werden jetzt ausgeführt, wenn Änderungen an gemounteten FFU-Dateien gespeichert werden, nachdem Imageaufgaben wie das Hinzufügen von Paketen oder das Aktivieren von Funktionen ausgeführt wurden{crlf;}- Es wurde eine Option hinzugefügt, um zu verhindern, dass die Maschine während der Ausführung von Imageoperationen schläft{crlf;}- Die Hilfedokumentation hat eine umfassende visuelle Aktualisierung gesehen{crlf;}- Dateizuordnungen sind jetzt für den Starter Script Editor festgelegt{crlf;}- Der StartImageschirm wurde optisch überarbeitet{crlf;}- 7-Zip wurde auf Version 26.01 aktualisiert{crlf;}- CODE: Das Festlegen der Lade- und Speicherfunktion wurde überarbeitet{crlf;}- Der Starter Script Editor und der Theme Designer können jetzt über das Menü Extras aufgerufen werden{crlf;}- In portablen Installationen können jetzt Dateizuordnungen für den Starter Script Editor umgeschaltet werden{crlf;}- Der DynaLog-Protokollbetrachter hat Unterstützung für Ereignisprotokollfilter erhalten{crlf;}- Datumseigenschaften können jetzt in einem Windows-nativen Format angezeigt werden{crlf;}- Markdig wurde auf Version 1.3.1 aktualisiert{crlf;}- Scintilla.NET wurde auf Version 6.1.2 aktualisiert{crlf;}- Die verwaltete DISM-API wurde auf Version 6.0.0 aktualisiert{crlf;}- Windows API Code Pack wurde auf Version 8.0.15.2 aktualisiert{crlf;}{crlf;}-- Features entfernt{crlf;}{crlf;}- Das WDS-Vorbereitungsskript wurde zugunsten des WDS-Helfers entfernt{crlf;}{crlf;}Änderungen seit der letzten Vorschau vorgenommen:{crlf;}{crlf;}-- Fehlerbehebungen{crlf;}{crlf;}- Genauigkeitsprobleme bei der Durchführung von Windows UEFI CA 2023-Bereitschaftsprüfungen auf Systemen behoben, die mit aktualisierten Bootloadern bereitgestellt wurden{crlf;}- Ein Problem wurde behoben, bei dem Hintergrundprozesse mit {quot;} fehlschlugen. Der Parameter ist in einigen Fällen falsch{quot;}{crlf;}-- Neue Funktionen{crlf;}{crlf;}- UnattendGen wurde auf die neueste Version aktualisiert und erfordert jetzt .NET 10{crlf;}- Der Newsfeed-Vorschauer hat mehrere Verbesserungen erfahren{crlf;}- Der Preinstallation Environment Helper erkennt jetzt von Rufus erstellte Antwortdateien und ermöglicht Ihnen, auf Konflikte in Antwortdateien zu reagieren{crlf;}

