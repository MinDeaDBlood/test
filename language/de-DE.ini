Windows.Label=(Windows XP SP1 und spätere Versionen) Beinhaltet alle Bluetooth-Geräte.
Camera.Message=(Windows 10 Version 1709 und spätere Versionen) Containsuniverselle Kameratreiber.
Cd.Rom.Drives.Message=Beinhaltet CD-ROM-Laufwerke, einschließlich SCSI-CD-ROM-Laufwerke. Standardmäßig installiert das Installationsprogramm der CD-ROM-Klasse des Systems auch einen vom System bereitgestellten CD-Audiotreiber und einen CD-ROM-Wechslertreiber als Plug-and-Play-Filter.
Hard.Disk.Drives.Label=Beinhaltet Festplattenlaufwerke. Siehe auch die HDC- und SCSIAdapter-Klassen.
VideoAdapters.Message=Beinhaltet Videoadapter. Zu den Treibern dieser Klasse gehören Anzeigetreiber und Video-Miniport-Treiber.
Extension.Message=(Windows 10 und spätere Versionen) Beinhaltet alle Geräte, die Anpassungen erfordern. Weitere Informationen finden Sie unter Verwenden einer Erweiterungs-INF-Datei.
Floppy.Disk.Drive.Label=Beinhaltet Diskettenlaufwerk-Controller.
Floppy.Disk.Drives.Label=Beinhaltet Diskettenlaufwerke.
Includes.Hard.Message=Beinhaltet Festplattencontroller, einschließlich ATA/ATAPI-Controller, aber keine SCSI- und RAID-Festplattencontroller.
InputDevices.Message=Beinhaltet interaktive Eingabegeräte, die vom systemeigenen HID-Klassentreiber bedient werden. Beinhaltet USB-Geräte, die dem USB-HID-Standard entsprechen, und Nicht-USB-Geräte, die einen HID-Minidriver verwenden. Weitere Informationen finden Sie unter HIDClass Device Setup Class. Siehe auch die Tastatur- oder Mausklassen.
ControlDevices.Message=Beinhaltet Geräte, die den Betrieb multifunktionaler IEEE 1284.4-Peripheriegeräte steuern.
Dot.Print.Functions.Message=Beinhaltet Dot4-Druckfunktionen. Eine Dot4-Druckfunktion ist eine Funktion auf einem Dot4-Gerät und verfügt über ein einzelnes untergeordnetes Gerät, das Mitglied der Einrichtungsklasse des Druckergeräts ist.
Ieeedevices.Support.Message=Beinhaltet IEEE 1394-Geräte, die die Geräteklasse des IEC-61883-Protokolls unterstützen. Die 61883-Komponente umfasst den Protokolltreiber 61883.sys, der verschiedene Audio- und Videodatenströme über den 1394-Bus überträgt. Dazu gehören derzeit DV, MPEG2, DSS und Audio in Standard-/Hoch-/Niedrigqualität. Die IEC-61883-Spezifikationen definieren diese Datenströme.
Ieeedevices.Support.Label=Beinhaltet IEEE 1394-Geräte, die die Geräteklasse des AVC-Protokolls unterstützen.
SBP2.Message=Beinhaltet IEEE 1394-Geräte, die die Geräteklasse des SBP2-Protokolls unterstützen.
HostControllers.Message=Beinhaltet 1394 Host-Controller, die an einen PCI-Bus angeschlossen sind, aber nicht 1394 Peripheriegeräte. Treiber für diese Klasse werden vom System bereitgestellt.
Still.Image.Capture.Label=Beinhaltet Geräte zur StandImageaufnahme, Digitalkameras und Scanner.
InfraredDevices.Message=Beinhaltet Infrarotgeräte. Zu den Treibern für diese Klasse gehören Serial-IR- und Fast-IR-NDIS-Miniports, aber siehe auch die Netzwerkadapterklasse für andere NDIS-Netzwerkadapter-Miniports.
Keyboards.Message=Beinhaltet alle Tastaturen. Das heißt, es muss auch im (sekundären) INF für ein aufgezähltes untergeordnetes HID-Tastaturgerät angegeben werden.
ScsimediaChanger.Label=Beinhaltet SCSI-Medienwechslergeräte.
Memory.Devices.Such.Label=Beinhaltet Speichergeräte wie Flash-Speicherkarten.
Modem.Devices.INF.Message=Beinhaltet Modemgeräte. Eine INF-Datei für ein Gerät dieser Klasse gibt die Funktionen und Konfiguration des Geräts an und speichert diese Informationen in der Registrierung. Eine INF-Datei für ein Gerät dieser Klasse kann auch verwendet werden, um Gerätetreiber für ein Controller-loses Modem oder ein Softwaremodem zu installieren. Diese Geräte teilen die Funktionalität zwischen dem Modemgerät und dem Gerätetreiber auf. Weitere Informationen zu Modem-INF-Dateien und Modemgeräten des Microsoft Windows Driver Model (WDM) finden Sie unter Übersicht über Modem-INF-Dateien und Hinzufügen von WDM-Modemunterstützung.
Display.Monitors.INF.Message=Beinhaltet Anzeigemonitore. Ein INF für ein Gerät dieser Klasse installiert keine Gerätetreiber, sondern gibt stattdessen die Funktionen eines bestimmten Monitors an, die in der Registrierung zur Verwendung durch Treiber von Videoadaptern gespeichert werden sollen. (Monitore werden als untergeordnete Geräte von Anzeigeadaptern aufgeführt.)
Mouse.Devices.Message=Beinhaltet alle Mausgeräte und andere Arten von Zeigegeräten, wie z. B. Trackballs. Das heißt, diese Klasse muss auch im (sekundären) INF für ein aufgezähltes untergeordnetes HID-Mausgerät angegeben werden.
Combo.Cards.Such.Message=Beinhaltet Combo-Karten, wie z. B. ein PCMCIA-Modem und einen Netzwerkkartenadapter. Der Treiber für ein solches Plug-and-Play-Multifunktionsgerät ist in dieser Klasse installiert und zählt Modem und Netzwerkkarte separat als untergeordnete Geräte auf.
Audio.Dvdmultimedia.Message=Beinhaltet Audio- und DVD-Multimediageräte, Joystick-Anschlüsse und Full-Motion-Videoaufnahmegeräte.
MultiportSerial.Message=Beinhaltet intelligente serielle Multiport-Karten, jedoch keine Peripheriegeräte, die eine Verbindung zu seinen Ports herstellen. Es umfasst keine unintelligenten seriellen Multiport-Controller (Typ 16550) oder seriellen Single-Port-Controller (siehe Ports-Klasse).
NetworkAdapter.Message=Besteht aus Netzwerkadaptertreibern. Diese Treiber müssen entweder NdisMRegisterMiniportDriver oder NetAdapterCreate aufrufen. Treiber, die weder NDIS noch NetAdapter verwenden, sollten eine andere Setup-Klasse verwenden.
Includes.Network.Message=Beinhaltet Netzwerk- und/oder Druckanbieter. NetClient-Komponenten sind in Windows 8.1, Windows Server 2012 R2 und höher veraltet.
Network.Services.Such.Label=Beinhaltet Netzwerkdienste wie Umleitungen und Server.
NdisprotocolsCo.Message=Beinhaltet eigenständige CoNDIS-Anrufmanager und CoNDIS-Clients der NDIS-Protokolle sowie Treiber höherer Levelin Transportstapeln.
SecureDevices.Message=Beinhaltet Geräte, die die kryptografische Verarbeitung der sicheren Socket-Schicht (SSL) beschleunigen.
PcmciacardBus.Message=Beinhaltet PCMCIA- und CardBus-Host-Controller, jedoch keine PCMCIA- oder CardBus-Peripheriegeräte. Treiber für diese Klasse werden vom System bereitgestellt.
Serial.Parallel.Port.Message=Beinhaltet serielle und parallele Portgeräte. Siehe auch die Klasse MultiportSerial.
Printers.Admin.Hit.Label=Beinhaltet Drucker. Schlagen Sie sie als IT-Administrator mit einem Baseballschläger.
Includes.SCSI.Message=Beinhaltet SCSI/1394-aufgezählte Drucker. Treiber für diese Klasse ermöglichen die Druckerkommunikation für einen bestimmten Bus.
ProcessorTypes.Label=Beinhaltet Prozessortypen.
ScsihostBus.Message=Beinhaltet SCSI-Hostbus-Adapter (HBAs), Disk-Array- und NVMe-Controller.
Includes.Trusted.Message=Beinhaltet Trusted Platform Module-Chips. Ein TPM ist ein sicherer Kryptoprozessor, der Sie bei Aktionen wie dem Generieren, Speichern und Begrenzen der Verwendung kryptografischer Schlüssel unterstützt. Jedes neu hergestellte Gerät muss standardmäßig TPM 2.0 implementieren und aktivieren. Weitere Informationen finden Sie unter TPM-Empfehlungen.
Includes.Sensor.Label=Beinhaltet Sensor- und Ortungsgeräte wie GPS-Geräte.
Smart.Card.Readers.Label=Beinhaltet Smartcard-Lesegeräte.
Virtual.Child.Device.Message=Beinhaltet ein virtuelles untergeordnetes Gerät zum Kapseln von Softwarekomponenten. Weitere Informationen finden Sie unter Hinzufügen von Softwarekomponenten mit einer INF-Datei.
Storage.Disks.Label=Speicherfestplatten, die einen Speicherstapel mit mehreren Warteschlangen verwenden.
Includes.Storage.Message=Beinhaltet Speichervolumes, wie sie vom vom System bereitgestellten logischen Volume-Manager definiert werden, und Klassentreiber, die Geräteobjekte zur Darstellung von Speichervolumes erstellen, wie beispielsweise den Systemfestplattenklassentreiber.
HalsSystem.Message=Beinhaltet HALs, Systembusse, Systembrücken, den System-ACPI-Treiber und den System-Volume-Manager-Treiber.
Tape.Drives.Including.Label=Beinhaltet Bandlaufwerke, einschließlich aller Band-Miniklassentreiber.
Usbdevice.Includes.Message=USBDevice umfasst alle USB-Geräte, die nicht zu einer anderen Klasse gehören. Diese Klasse wird nicht für USB-Host-Controller und -Hubs verwendet. Treiber für diese Geräte werden vom Betriebssystem bereitgestellt und sollten die USB-Klasse verwenden, die in den für die Systemverwendung reservierten systemdefinierten Geräte-Setup-Klassen beschrieben ist.
WindowsCeactive.Message=Beinhaltet Windows CE ActiveSync-Geräte. Die WCEUSBS-Setup-Klasse unterstützt die Kommunikation zwischen einem Personalcomputer und einem Gerät, das mit dem Windows CE ActiveSync-Treiber (im Allgemeinen PocketPC-Geräte) kompatibel ist, über USB.
Wpddevices.Label=Beinhaltet WPD-Geräte.

