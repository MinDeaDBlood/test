DISM.Tools.Enable.Message=DISMTools aktiviert oder deaktiviert bestimmte Funktionen, wenn sie nicht mit der angegebenen ausführbaren DISM-Datei, dem aktuellen Windows-Image oder beiden kompatibel sind.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Wenn DISMTools beispielsweise ein Windows 7-Image, eine Windows 7-Version von DISM oder beides erkennt, Dadurch werden die Wartung von AppX-Paketen und -Funktionen deaktiviert, da diese nicht mit dieser Plattform und diesen Tools kompatibel sind. {lbrace;}0{rbrace;}{lbrace;}0{rbrace;}DISMTools kann auch Funktionen basierend auf anderen Imageparametern, wie beispielsweise der Edition, deaktivieren. Dies passiert normalerweise bei Windows PE-Imagen.
AppX.Package.Display.Message=AppX-Paketanzeigenamen sind der Teil der Paketfamiliennamen, der keine paketspezifischen Details wie Architektur, Version oder Publisher-Hash enthält.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}AppX-Paket {lbrace;}1{rbrace;}freundliche Anzeigenamen{lbrace;}1{rbrace;} sind die Namen, die Sie im Startmenü sehen. Sie werden aus Anwendungsidentitätsinformationen im Manifest oder aus eingebetteten Zeichenfolgen in resources.pri gelesen.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Wenn DISMTools den benutzerfreundlichen Anzeigenamen nicht abrufen kann, wird der Anwendungsanzeigename angezeigt.
Configure.Search.Message=Wenn Sie Suchmaschineneinstellungen konfigurieren, können Sie auswählen, wie viel Toleranz DISMTools für künstliche Intelligenz, KI und Funktionen in einer Suchmaschine haben soll.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Schalten Sie so viele KI-Funktionen wie möglich aus{lbrace;}1{rbrace;} ermöglicht Ihnen die Auswahl aus Suchmaschinen, in denen KI-Funktionen deaktiviert oder standardmäßig nicht implementiert sind.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Lassen Sie mich die KI-Funktionen in meiner Suchmaschine steuern{lbrace;}1{rbrace;} fügt Suchmaschinen hinzu, in denen KI-Funktionen standardmäßig aktiviert sind, die aber über URL-Parameter oder Engine-Einstellungen gesteuert werden können.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Schalten Sie so viele KI-Funktionen wie möglich ein{lbrace;}1{rbrace;} ermöglicht Ihnen die Auswahl aus allen verfügbaren Suchmaschinen, einschließlich KI-basierter Suchmaschinen oder Suchmaschinen, die dedizierte KI-Modi bewerben.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Normalerweise Die zweite Option ist die ausgewogenste Wahl. Für ein datenschutzorientierteres Erlebnis schalten Sie diese Funktionen aus.
Bg.Procs.Allow.Message=Hintergrundprozesse ermöglichen es DISMTools, Informationen über das Windows-Image zu sammeln, mit dem Sie arbeiten, und die meisten Aufgaben zu aktivieren. Beispiele hierfür sind Betriebssystempakete und -funktionen in einem Windows-Image.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Diese Prozesse werden nicht nur beim Abrufen von Imagedateiinformationen verwendet, sondern auch bei der Verwaltung von Online- oder Offline-Installationen.

