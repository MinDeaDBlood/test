[Options.QuickHelp]
DISM.Tools.Enable.Message=DISMTools abilita o disabilita alcune funzioni se non sono compatibili con l’eseguibile DISM specificato, con l’immagine Windows corrente o con entrambi.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Per esempio, se DISMTools rileva un’immagine Windows 7, una versione di DISM per Windows 7 o entrambe, disabilita la gestione dei pacchetti AppX e delle funzionalità perché non sono compatibili con quella piattaforma e con quegli strumenti.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}DISMTools può anche disabilitare funzioni in base ad altri parametri dell’immagine, come l’edizione. Questo avviene di solito con le immagini Windows PE.
AppX.Package.Display.Message=I nomi visualizzati dei pacchetti AppX sono la parte del nome della famiglia del pacchetto che non contiene dettagli specifici, come architettura, versione o hash dell’autore.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}I {lbrace;}1{rbrace;}nomi descrittivi{lbrace;}1{rbrace;} dei pacchetti AppX sono i nomi visibili nel menu Start. Vengono letti dalle informazioni di identità dell’applicazione nel manifesto o dalle stringhe incorporate in resources.pri.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Se DISMTools non riesce a ottenere il nome descrittivo, mostra il nome visualizzato dell’applicazione.
Configure.Search.Message=Quando configuri il motore di ricerca, puoi scegliere quanta tolleranza deve avere DISMTools verso le funzioni di intelligenza artificiale, AI, del motore.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Disattiva quante più funzioni AI possibile{lbrace;}1{rbrace;} consente di scegliere motori in cui le funzioni AI sono disattivate o non presenti per impostazione predefinita.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Fammi controllare le funzioni AI del mio motore di ricerca{lbrace;}1{rbrace;} aggiunge motori con funzioni AI attive per impostazione predefinita, ma controllabili tramite parametri URL o impostazioni del motore.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Attiva quante più funzioni AI possibile{lbrace;}1{rbrace;} consente di scegliere tutti i motori disponibili, inclusi motori basati su AI o motori che promuovono modalità AI dedicate.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Di solito, la seconda opzione è la più equilibrata. Per un’esperienza più orientata alla privacy, disattiva queste funzioni.
Bg.Procs.Allow.Message=I processi in background consentono a DISMTools di raccogliere informazioni sull’immagine Windows in uso e abilitano la maggior parte delle attività. Alcuni esempi sono i pacchetti del sistema operativo e le funzionalità presenti in un’immagine Windows.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Questi processi non vengono usati solo per ottenere informazioni sui file immagine, ma anche per gestire installazioni online o offline.

