[Options.QuickHelp]
DISM.Tools.Enable.Message=DISMTools will enable or disable certain features if they are not compatible with the specified DISM executable, the current Windows image, or both.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}For example, if DISMTools detects a Windows 7 image, a Windows 7 version of DISM, or both, it will disable AppX package and capability servicing because they are not compatible with that platform and tooling.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}DISMTools can also disable features based on other image parameters, such as the edition. This usually happens with Windows PE images.
AppX.Package.Display.Message=AppX package display names are the part of package family names that does not contain package specific details, such as architecture, version, or publisher hash.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}AppX package {lbrace;}1{rbrace;}friendly display names{lbrace;}1{rbrace;} are the names you see in the Start menu. They are read from application identity information in the manifest or from embedded strings in resources.pri.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}If DISMTools cannot get the friendly display name, it will show the application display name.
Configure.Search.Message=When you configure search engine settings, you can choose how much tolerance DISMTools should have for artificial intelligence, AI, features in a search engine.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Turn off as many AI features as possible{lbrace;}1{rbrace;} lets you pick from search engines where AI features are disabled or not implemented by default.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Let me control the AI features in my search engine{lbrace;}1{rbrace;} adds search engines that have AI features enabled by default, but can be controlled through URL parameters or engine settings.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Turn on as many AI features as possible{lbrace;}1{rbrace;} lets you pick from all available search engines, including AI based engines or engines that promote dedicated AI modes.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Usually, the second option is the most balanced choice. For a more privacy focused experience, turn these features off.
Bg.Procs.Allow.Message=Background processes allow DISMTools to collect information about the Windows image you are working with and enable most tasks. Examples include operating system packages and features in a Windows image.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}These processes are used not only when getting image file information, but also when managing online or offline installations.

