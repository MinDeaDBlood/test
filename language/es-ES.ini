[Options.QuickHelp]
DISM.Tools.Enable.Message=DISMTools activará o desactivará ciertas funciones si no son compatibles con el ejecutable de DISM especificado, con la imagen actual de Windows o con ambos.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Por ejemplo, si DISMTools detecta una imagen de Windows 7, una versión de DISM de Windows 7 o ambas cosas, desactivará el mantenimiento de paquetes AppX y capacidades porque no son compatibles con esa plataforma y esas herramientas.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}DISMTools también puede desactivar funciones según otros parámetros de la imagen, como la edición. Esto suele ocurrir con imágenes de Windows PE.
AppX.Package.Display.Message=Los nombres de visualización de paquetes AppX son la parte del nombre de familia del paquete que no contiene detalles específicos, como arquitectura, versión o hash del publicador.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Los {lbrace;}1{rbrace;}nombres descriptivos{lbrace;}1{rbrace;} de paquetes AppX son los nombres que ves en el menú Inicio. Se leen desde la información de identidad de la aplicación en el manifiesto o desde cadenas incrustadas en resources.pri.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Si DISMTools no puede obtener el nombre descriptivo, mostrará el nombre de visualización de la aplicación.
Configure.Search.Message=Al configurar el motor de búsqueda, puedes elegir cuánta tolerancia debe tener DISMTools con las funciones de inteligencia artificial, AI, del motor.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Desactivar tantas funciones de AI como sea posible{lbrace;}1{rbrace;} permite elegir motores donde las funciones de AI están desactivadas o no existen por defecto.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Controlar las funciones de AI en mi motor de búsqueda{lbrace;}1{rbrace;} añade motores que tienen funciones de AI activadas por defecto, pero que pueden controlarse mediante parámetros de URL o ajustes del motor.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Activar tantas funciones de AI como sea posible{lbrace;}1{rbrace;} permite elegir todos los motores disponibles, incluidos motores basados en AI o motores que promocionan modos dedicados de AI.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Normalmente, la segunda opción es la más equilibrada. Para una experiencia más orientada a la privacidad, desactiva estas funciones.
Bg.Procs.Allow.Message=Los procesos en segundo plano permiten que DISMTools recopile información sobre la imagen de Windows con la que trabajas y habilitan la mayoría de las tareas. Algunos ejemplos son los paquetes del sistema operativo y las funciones de una imagen de Windows.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Estos procesos se usan no solo al obtener información de archivos de imagen, sino también al administrar instalaciones en línea o sin conexión.

