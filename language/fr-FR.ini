PreviewChanges.Message=Overall changes:{crlf;}{crlf;}-- Bugfixes in preview releases{crlf;}{crlf;}- Fixed an issue where removed features would appear in the wrong place{crlf;}- Fixed a minor UI issue where the proper user principal name (UPN) would not be shown when selecting a user in the ADDS domain join wizard{crlf;}- Fixed a minor UI issue where the NT logon path of a domain user would not be shown when launching the ADDS domain join wizard for the first time{crlf;}- Fixed some HiDPI issues{crlf;}- Fixed an issue where, when managing the active installation, the version's revision number would sometimes not coincide with the actual revision number{crlf;}- Fixed an issue where information about a Windows image would be cleared after adding or removing packages{crlf;}- Fixed an issue where the program would throw an exception if it couldn't create the logs directory (#344, thanks @Low351){crlf;}- Fixed an issue where GraphoView would not display information about a selected Windows image if the WDS group it belongs to only has 1 image{crlf;}- Fixed an issue where capture compression type options were not being used when performing FFU captures{crlf;}- Fixed an issue where the program would throw an exception when performing multiple driver exports by class name{crlf;}- Fixed an exception (#350, thanks @TackleBarry80){crlf;}- Registry hives that were unloaded externally no longer cause errors when unloading them from the image registry control panel{crlf;}- Non-PowerShell-based endpoints no longer throw CORS issues when calling WDS Helper Server APIs{crlf;}- Fixed an issue where App Installer download errors would not appear in the foreground{crlf;}- Fixed an issue where tutorial videos would not be playable{crlf;}- The WDS Helper client message for downloading unattended answer files no longer shows at all times{crlf;}- Fixed an issue where the program would throw an exception when saving Windows PE configuration of an offline Windows PE installation{crlf;}- Fixed an issue where the full date string was not displaying correctly when accessing image properties with Windows representations of dates turned off{crlf;}- When adding a boot image to the WDS server, the service start is now requested only when it is not running{crlf;}- Fixed an exception that would happen when adding certain AppX packages (#365, #366, thanks @charlezmmonroe-byte){crlf;}{crlf;}-- New features{crlf;}{crlf;}- The Sysprep Preparation Tool has seen support for `CopyProfile` and can now remove AppX packages from the reference system{crlf;}- Guards have been added to prevent running the PE Helper on a PXE environment, and to warn when running the PXE Helpers on a non-PXE environment{crlf;}- The autorun menu now has options to browse disc contents and copy the boot image to a WDS server{crlf;}- The DISMTools Preinstallation Environment can now be configured via policies{crlf;}- You can now view images and groups in a WDS server graphically{crlf;}- When launching the Driver Installation Module, the Preinstallation Environment can now tell you the hardware IDs of unknown devices{crlf;}- HotInstall can now export SCSI adapters to install them in the DTPE image{crlf;}- If a non-sysprepped volume is selected in the image capture script, it will now warn you{crlf;}- A new task has been added to copy installation images to a Windows Deployment Services (WDS) server{crlf;}- From the Autorun application you can now specify the WDS image group to upload the image to{crlf;}- The Autorun application and HotInstall have seen HiDPI improvements{crlf;}- Partition table overrides can now be used when deploying images with the WDS Helper{crlf;}- PXE Helper Servers can now be started using a different port by holding down SHIFT and performing an action in the following places:{crlf;}  - From the Autorun application{crlf;}  - From the Tools > Start PXE Helper Server for... menu in the main program{crlf;}- The architecture for the WDS boot image is now picked graphically{crlf;}- The default set of DISMTools Preinstallation Environment backgrounds has been overhauled{crlf;}- The WDS Helper Client now detects the assigned volume letter for the image share more reliably{crlf;}- ISO file creation results are now displayed in a notification{crlf;}- You can now configure the keyboard layout in the Preinstallation Environment graphically{crlf;}- If the Sysprep Preparation Tool was invoked before capturing the image, temporary files and boot entries are now removed if the capture succeeds. The resulting Windows image will still not contain any of those items{crlf;}- The version reporter watermark in the DISMTools Preinstallation Environment can now detect when the environment has booted via a network{crlf;}- The PE Helper can now include your target system's essential drivers (storage controllers and network adapters) in the DISMTools Preinstallation Environment{crlf;}- The ISO creation wizard will let you specify a save location if you clicked OK without having specified one{crlf;}- You can now specify scripts written in VBScript and JScript{crlf;}- The {quot;}Enable Batch script file locks{quot;} starter script has been introduced{crlf;}- The {quot;}Remove MAX_PATH length limit{quot;} starter script has been introduced{crlf;}- The {quot;}Show and Hide System Desktop icons{quot;} starter script has been introduced{crlf;}- The {quot;}Set File Explorer Launch Folder{quot;} starter script has been introduced{crlf;}- The {quot;}Disable Windows Admin Center/Azure Arc banner{quot;} starter script has been introduced{crlf;}- The {quot;}Disable Shutdown Event Tracker{quot;} starter script has been introduced{crlf;}- The {quot;}Refresh Windows Explorer{quot;} starter script has been introduced{crlf;}- The {quot;}Configure Start Menu Appearance{quot;} starter script has been introduced{crlf;}- The {quot;}Disable warnings for unsigned RDP files{quot;} starter script has been introduced{crlf;}- The {quot;}Configure PowerShell execution policy{quot;} starter script has been introduced{crlf;}- The {quot;}Configure Power Plan Values{quot;} starter script has been introduced{crlf;}- The {quot;}Invoke Windows Utility Configuration{quot;} starter script has been updated{crlf;}- The {quot;}Restore classic context menu in Windows 11{quot;} starter script has been introduced{crlf;}- The Starter Script Editor has seen several improvements:{crlf;}  - The Starter Script Editor has received dark mode support{crlf;}  - The Starter Script Editor now detects read-only starter scripts and removes such attribute when saving them{crlf;}  - Spacing in script code can now be normalized{crlf;}- Organizational units and users in OUs are now sorted alphabetically in the ADDS domain join wizard{crlf;}- The ADDS domain join wizard will now let you continue if you had selected an account that does not require a password{crlf;}- A task has been added to copy a pre-configured answer file to an image so that it boots to Audit mode automatically{crlf;}- The ADDS domain join wizard has seen a couple of improvements:{crlf;}  - The wizard will no longer let you continue when you specify a domain account that does not exist{crlf;}  - You can now test domain name resolution by invoking nslookup{crlf;}  - You can now pick account objects from anywhere in your domain{crlf;}- When applying answer files you can now choose whether to copy them to the target image's Sysprep folder{crlf;}- You can now enlarge the preview area for starter script code{crlf;}- You can now configure account display names independently from account names{crlf;}- Post-installation scripts can now be reordered{crlf;}- Batch scripts with NT extensions are no longer supported{crlf;}- Service information can now be saved to a report, whether you manage a Windows image or an installation{crlf;}- Services can now be removed{crlf;}- The image information saver is now run asynchronously{crlf;}- When information about a package file can't be obtained, DISMTools will now continue processing the rest of the queue{crlf;}- Filter assistants have been added to the feature, capability, and driver information dialogs to allow you to build queries more easily{crlf;}- A new automatic image reload service is now included, to let you have all your images reloaded on system startup{crlf;}- You can now export drivers by class name{crlf;}- Image capture tasks will now warn you when source installations have not been prepared with Sysprep{crlf;}- A new task has been added to optimize Windows images{crlf;}- Support for Full Flash Utility (FFU) has been introduced. Variations of the image application, capture, split, and optimization have been introduced with FFU support{crlf;}- From the project view you can now perform commit operations to FFU files using a workaround{crlf;}- You can now get installed driver information from Windows 7 images{crlf;}- Projects and installation management modes now load and unload much faster{crlf;}- Removing provisioned AppX packages from the online installation management mode is much more reliable now{crlf;}- You can now access WIM and FFU variants of the image capture and application tasks much more easily{crlf;}- After extracting images from ISO files, the program will now let you select the most suitable installation image from it{crlf;}- You can now view information specific to FFU files when viewing mounted image properties{crlf;}- When downloading packages from App Installer files you can now copy the URLs to the main application package{crlf;}- When exporting drivers by class name or when filtering installed drivers by class name, you can now choose from third-party classes provided by third-party drivers in your Windows image or installation{crlf;}- You can now export drivers from Windows 7 images and installations{crlf;}- Saving service changes is much faster now{crlf;}- Questions asked by the image information saver are no longer asked in the background{crlf;}- FFU file commit operations are now carried out when saving changes to mounted FFU files after performing image tasks such as adding packages or enabling features{crlf;}- An option has been added to prevent the machine from sleeping while performing image operations{crlf;}- Help documentation has seen a major visual refresh{crlf;}- File associations are now set for the Starter Script Editor{crlf;}- The home screen has seen a visual overhaul{crlf;}- 7-Zip has been updated to version 26.01{crlf;}- CODE: setting load and save functionality has been revamped{crlf;}- The Starter Script Editor and the theme designer can now be invoked from the Tools menu{crlf;}- In portable installations, file associations can now be toggled for the Starter Script Editor{crlf;}- The DynaLog log viewer has received support for event log filters{crlf;}- Date properties can now be displayed in a Windows-native format{crlf;}- Markdig has been updated to version 1.3.1{crlf;}- Scintilla.NET has been updated to version 6.1.2{crlf;}- The managed DISM API has been updated to version 6.0.0{crlf;}- Windows API Code Pack has been updated to version 8.0.15.2{crlf;}{crlf;}-- Removed features{crlf;}{crlf;}- The WDS preparation script has been removed in favor of the WDS Helper{crlf;}{crlf;}Changes made since last preview:{crlf;}{crlf;}-- Bugfixes{crlf;}{crlf;}- Fixed accuracy issues when performing Windows UEFI CA 2023 readiness checks on systems that were deployed using updated boot loaders{crlf;}- Fixed an issue where background processes would fail with {quot;}The parameter is incorrect{quot;} in some cases{crlf;}{crlf;}-- New features{crlf;}{crlf;}- UnattendGen has been updated to the latest version, now requiring .NET 10{crlf;}- The news feed previewer has seen several improvements{crlf;}- The Preinstallation Environment Helper now detects answer files created by Rufus, and lets you act on answer file conflicts

