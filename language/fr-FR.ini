[Options.QuickHelp]
DISM.Tools.Enable.Message=DISMTools active ou désactive certaines fonctions si elles ne sont pas compatibles avec l’exécutable DISM indiqué, avec l’image Windows actuelle, ou avec les deux.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Par exemple, si DISMTools détecte une image Windows 7, une version de DISM pour Windows 7, ou les deux, il désactive la maintenance des packages AppX et des fonctionnalités, car elles ne sont pas compatibles avec cette plateforme et ces outils.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}DISMTools peut aussi désactiver des fonctions selon d’autres paramètres de l’image, comme l’édition. Cela arrive généralement avec les images Windows PE.
AppX.Package.Display.Message=Les noms d’affichage des packages AppX correspondent à la partie du nom de famille du package qui ne contient pas de détails propres au package, comme l’architecture, la version ou le hachage de l’éditeur.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Les {lbrace;}1{rbrace;}noms conviviaux{lbrace;}1{rbrace;} des packages AppX sont les noms affichés dans le menu Démarrer. Ils sont lus depuis les informations d’identité de l’application dans le manifeste ou depuis les chaînes intégrées dans resources.pri.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Si DISMTools ne peut pas obtenir le nom convivial, il affiche le nom d’affichage de l’application.
Configure.Search.Message=Lorsque tu configures le moteur de recherche, tu peux choisir le niveau de tolérance de DISMTools envers les fonctions d’intelligence artificielle, AI, du moteur.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Désactiver autant de fonctions AI que possible{lbrace;}1{rbrace;} permet de choisir des moteurs où les fonctions AI sont désactivées ou absentes par défaut.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Me laisser contrôler les fonctions AI de mon moteur de recherche{lbrace;}1{rbrace;} ajoute des moteurs qui ont des fonctions AI activées par défaut, mais contrôlables par paramètres d’URL ou réglages du moteur.{lbrace;}0{rbrace;}{lbrace;}1{rbrace;}Activer autant de fonctions AI que possible{lbrace;}1{rbrace;} permet de choisir tous les moteurs disponibles, y compris les moteurs basés sur l’AI ou ceux qui mettent en avant des modes AI dédiés.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}En général, la deuxième option est le choix le plus équilibré. Pour une expérience plus axée sur la confidentialité, désactive ces fonctions.
Bg.Procs.Allow.Message=Les processus en arrière plan permettent à DISMTools de collecter des informations sur l’image Windows utilisée et d’activer la plupart des tâches. Par exemple, les packages du système d’exploitation et les fonctionnalités présentes dans une image Windows.{lbrace;}0{rbrace;}{lbrace;}0{rbrace;}Ces processus ne sont pas utilisés uniquement pour obtenir les informations des fichiers image, mais aussi pour gérer les installations en ligne ou hors connexion.

